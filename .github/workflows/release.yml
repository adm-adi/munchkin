name: Android Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build And Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: munchkin_release
          POSTGRES_USER: munchkin
          POSTGRES_PASSWORD: munchkin
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MUNCHKIN_DATABASE_URL: jdbc:postgresql://localhost:5432/munchkin_release
      MUNCHKIN_DATABASE_USER: munchkin
      MUNCHKIN_DATABASE_PASSWORD: munchkin
      MUNCHKIN_JWT_SECRET: release-ci-secret-change-before-prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode Keystore
        id: decode_keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            # Decode with -d and ignore garbage (-di) if possible, or just remove newlines first
            echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 --decode > munchkin.keystore
            echo "Keystore decoded successfully"
          else
            echo "::warning::Secret KEYSTORE_BASE64 not found. Build may fail if signing config requires it."
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify shared, backend, app, and migrations
        run: ./gradlew :shared:test :backend:test :backend:migrateDatabase :app:testDebugUnitTest --stacktrace

      - name: Build Release APK And Backend Bundle
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :backend:distZip --stacktrace

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            backend/build/distributions/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
